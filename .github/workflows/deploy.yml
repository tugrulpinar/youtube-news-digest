name: Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: youtube-digest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.0"

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Ensure ECR repository exists
        working-directory: terraform
        run: |
          terraform apply -target=aws_ecr_repository.digest -auto-approve \
            -var="youtube_api_key=${{ secrets.YOUTUBE_API_KEY }}" \
            -var="youtube_channel_id=${{ secrets.YOUTUBE_CHANNEL_ID }}" \
            -var="email_address=${{ vars.EMAIL_ADDRESS }}" \
            -var="image_tag=${{ github.sha }}"

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="youtube_api_key=${{ secrets.YOUTUBE_API_KEY }}" \
            -var="youtube_channel_id=${{ secrets.YOUTUBE_CHANNEL_ID }}" \
            -var="email_address=${{ vars.EMAIL_ADDRESS }}" \
            -var="image_tag=${{ github.sha }}"
